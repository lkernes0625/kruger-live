name: Scrape Kruger Status

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run scraper
        run: node scripts/scrape-kruger-status.js > kruger-status.json

      - name: Check if output has content
        run: |
          if [ ! -s kruger-status.json ]; then
            echo "Output empty, skipping commit"
            exit 0
          fi

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update kruger-status feed"
          file_pattern: kruger-status.json
