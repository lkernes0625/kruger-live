name: Scrape Kruger Status
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/scrape-kruger-status.js > kruger-status.json
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: update kruger-status feed
          file_pattern: kruger-status.json
