name: Scrape Kruger Status

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        run: node scripts/scrape-kruger-status.js > kruger-status.json

      - name: Check if output has content
        run: |
          if [ ! -s kruger-status.json ]; then
            echo "Output empty, skipping commit"
            exit 0
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kruger-status.json
          git diff --staged --quiet || git commit -m "chore: update kruger-status feed [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
